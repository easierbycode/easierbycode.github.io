<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Metallic Madness Zone 1 - Bad Future</title>
    <style>
        body { margin:0; background:#000; overflow:hidden; font-family:'Courier New', monospace; }
        canvas { display:block; margin:20px auto; image-rendering:pixelated; border:8px solid #111; box-shadow:0 0 40px #0a3;}
        #ui { position:absolute; top:15px; left:15px; color:#0f0; text-shadow:2px 2px 0 #000; pointer-events:none; font-size:22px; line-height:1.1; letter-spacing:2px; }
        #instructions { position:absolute; bottom:15px; left:15px; color:#0f0; text-shadow:2px 2px 0 #000; pointer-events:none; font-size:14px; line-height:1.4; }
        #touch-controls {
            position: fixed; bottom: 0; left: 0; right: 0;
            pointer-events: none; z-index: 10;
            transition: opacity 0.35s ease;
            display: none;
        }
        #touch-controls.visible { display: block; }
        #touch-controls.hidden { opacity: 0; pointer-events: none !important; }
        .touch-btn {
            position: absolute; pointer-events: auto;
            border: 2px solid rgba(0,255,0,0.45);
            background: rgba(0,20,0,0.4);
            border-radius: 14px; color: rgba(0,255,0,0.7);
            font-family: 'Courier New', monospace; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        .touch-btn:active, .touch-btn.pressed {
            background: rgba(0,255,0,0.18);
            border-color: rgba(0,255,0,0.8);
            color: rgba(0,255,0,1);
        }
        #touch-left  { left: 16px; bottom: 28px; width: 72px; height: 72px; font-size: 32px; }
        #touch-right { left: 104px; bottom: 28px; width: 72px; height: 72px; font-size: 32px; }
        #touch-jump  { right: 16px; bottom: 28px; width: 80px; height: 80px; font-size: 16px; }
        #touch-boost { right: 112px; bottom: 28px; width: 64px; height: 64px; font-size: 13px; }
    </style>
</head>
<body>
    <div id="ui">
        METALLIC MADNESS<br>
        <span id="rings">RINGS 00</span>  TIME <span id="time">000</span>
    </div>
    <div id="instructions">
        ← → / A D = Move  SPACE / ↑ / LEFT CLICK = Jump  SHIFT / X = BOOST<br>
        Right Analog = Camera  L3 = Fullscreen  R / A/X / START = Restart<br>
        RIGHT CLICK = Move Right (hold)
    </div>
    <canvas id="c" width="800" height="600"></canvas>
    <div id="touch-controls">
        <div id="touch-left" class="touch-btn">&larr;</div>
        <div id="touch-right" class="touch-btn">&rarr;</div>
        <div id="touch-boost" class="touch-btn">BOOST</div>
        <div id="touch-jump" class="touch-btn">JUMP</div>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const SCREEN_W = 800;
        const SCREEN_H = 600;

        let TILE_SIZE = 16;
        let WORLD_W = 8448;
        let numCols = 528;
        let numRows = 128;
        let map = null;

        const player = { x: 180, y: 380, vx: 0, vy: 0, w: 38, h: 48, facing: 1, onGround: false };

        let ringsCollected = 0, time = 0, gameWon = false, gameOver = false, showDebug = false, usedGamepad = false;
        let camX = 0, camOffset = 0;

        const keys = {};
        let particles = [], exhaustParticles = [], ringsList = [], enemies = [], platforms = [];

        let coyoteTime = 0, jumpBuffer = 0, isBoosting = false, boostKick = 0;
        let previousOnGround = false;
        let mouseRight = false;

        const playerSprite = new Image();
        playerSprite.src = 'http://easierbycode.com/assets/spritesheets/motorcycle.png';

        const rocktoSprite = new Image();
        rocktoSprite.src = 'http://easierbycode.com/assets/spritesheets/rockto.png';

        let motorcycleLoaded = false;
        let rocktoLoaded = false;
        let tilesLoaded = false;

        playerSprite.onload = () => { motorcycleLoaded = true; console.log('Motorcycle loaded'); };
        playerSprite.onerror = () => console.error('Failed to load motorcycle.png');

        rocktoSprite.onload = () => { rocktoLoaded = true; console.log('Rockto loaded'); };
        rocktoSprite.onerror = () => console.error('Failed to load rockto.png');

        const fg = new Image();
        fg.src = 'http://easierbycode.com/assets/spritesheets/tiles.png';
        fg.onload = () => { tilesLoaded = true; console.log('Tiles loaded'); };
        fg.onerror = () => console.error('Failed to load tiles.png');

        let currentFrame = 0, lastAnimTime = Date.now();
        const FRAME_WIDTH = 86, FRAME_HEIGHT = 46, TOTAL_FRAMES = 10;

        let loaded = false, levelLoaded = false;
        let prevRestartPressed = false;

        fetch('https://easierbycode.com/assets/spritesheets/level_data.json')
            .then(r => r.json())
            .then(data => {
                map = data.map || [];
                numCols = data.numCols || 528;
                numRows = data.numRows || 128;
                TILE_SIZE = 16;
                WORLD_W = numCols * TILE_SIZE;
                generateCollisionFromMap();
                levelLoaded = true;
                console.log('Level data loaded');
            })
            .catch(err => {
                console.error('Level JSON failed:', err);
                levelLoaded = true;
                generateFallbackPlatforms();
            });

        function generateCollisionFromMap() {
            platforms = [];
            for (let y = 0; y < numRows; y++) {
                let start = -1;
                for (let x = 0; x <= numCols; x++) {
                    const tile = map[y * numCols + x];
                    const solid = tile !== 2 && tile !== 0 && tile !== undefined && tile !== null;
                    if (solid && start === -1) start = x;
                    else if (!solid && start !== -1) {
                        platforms.push({ x: start * TILE_SIZE, y: y * TILE_SIZE, w: (x - start) * TILE_SIZE, h: TILE_SIZE });
                        start = -1;
                    }
                }
                if (start !== -1) platforms.push({ x: start * TILE_SIZE, y: y * TILE_SIZE, w: (numCols - start) * TILE_SIZE, h: TILE_SIZE });
            }
        }

        function generateFallbackPlatforms() {
            platforms = [
                {x:0, y:528, w:WORLD_W, h:160},
                {x:128, y:448, w:480, h:32}, {x:704, y:384, w:288, h:32},
                {x:1056, y:480, w:416, h:32}, {x:1536, y:352, w:352, h:32},
                {x:1984, y:448, w:320, h:32}, {x:2336, y:288, w:480, h:32},
                {x:2912, y:416, w:288, h:32}, {x:3232, y:256, w:576, h:32},
                {x:3904, y:384, w:384, h:32}, {x:4352, y:320, w:320, h:32},
                {x:4736, y:448, w:416, h:32}, {x:5248, y:288, w:480, h:32},
                {x:5792, y:384, w:736, h:32}, {x:6144, y:320, w:256, h:32},
                {x:6496, y:448, w:352, h:32}, {x:7200, y:320, w:448, h:32},
                {x:480, y:480, w:160, h:32}, {x:1184, y:320, w:160, h:32},
                {x:2688, y:352, w:192, h:32}, {x:3776, y:288, w:160, h:32},
                {x:4480, y:352, w:96, h:32}, {x:4960, y:384, w:160, h:32},
                {x:5600, y:256, w:128, h:32}, {x:6816, y:352, w:192, h:32},
                {x:800, y:416, w:96, h:32}, {x:1408, y:384, w:128, h:32},
                {x:1824, y:288, w:128, h:32}, {x:2144, y:416, w:96, h:32},
                {x:3104, y:320, w:160, h:32}, {x:3552, y:256, w:96, h:32},
                {x:4000, y:320, w:128, h:32}, {x:4608, y:384, w:96, h:32},
                {x:5088, y:224, w:160, h:32}, {x:5952, y:352, w:96, h:32},
                {x:6272, y:288, w:160, h:32}, {x:6944, y:384, w:128, h:32},
                {x:7392, y:288, w:192, h:32}
            ];
        }

        class Rockto {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.w = 61;
                this.h = 57;
                this.phase = 0;
                this.radius = 140;
                this.speed = 0.028;
                this.centerX = x + 320;
                this.centerY = y + 180;
                this.active = true;
            }

            update() {
                if (!this.active) return;
                this.phase += this.speed;
                this.x = this.centerX + Math.cos(this.phase) * this.radius;
                this.y = this.centerY + Math.sin(this.phase) * this.radius;
            }

            draw() {
                if (!rocktoLoaded || !this.active) {
                    // Fallback red circle if sprite broken
                    ctx.fillStyle = '#ff4444';
                    ctx.beginPath();
                    ctx.arc(this.x - camX, this.y, 30, 0, Math.PI*2);
                    ctx.fill();
                    return;
                }
                let frame = Math.floor((Date.now() / 120) % 4);
                let sx = frame * 61;
                ctx.drawImage(rocktoSprite, sx, 0, 61, 57, this.x - camX, this.y, 61, 57);
            }

            checkCollision() {
                if (!this.active) return false;
                return Math.abs(player.x + player.w/2 - this.x) < 50 &&
                       Math.abs(player.y + player.h/2 - this.y) < 50;
            }
        }

        let rocktos = [];

        function triggerHaptic(type = 'land') {
            const pads = navigator.getGamepads ? navigator.getGamepads() : [];
            for (let gp of pads) {
                if (!gp) continue;
                try {
                    if (gp.vibrationActuator) {
                        if (type === 'land') gp.vibrationActuator.playEffect("dual-rumble", { duration: 160, strongMagnitude: 0.9, weakMagnitude: 0.85 });
                        else if (type === 'left') gp.vibrationActuator.playEffect("dual-rumble", { duration: 80, strongMagnitude: 0.2, weakMagnitude: 1.0 });
                        else if (type === 'right') gp.vibrationActuator.playEffect("dual-rumble", { duration: 80, strongMagnitude: 1.0, weakMagnitude: 0.2 });
                    }
                } catch (e) {}
            }
        }

        function createRing(x, y) { ringsList.push({x, y, collected: false, bob: 0}); }
        function createEnemy(x, y) { enemies.push({x, y, vx: -1.8, w: 36, h: 36}); }
        function createParticle(x, y, count = 8) {
            for (let i = 0; i < count; i++) particles.push({x: x + Math.random()*25-12, y: y + Math.random()*4, vx: Math.random()*7-3.5, vy: Math.random()*-4-1, life: 22 + Math.random()*14, size: 3.5 + Math.random()*3});
        }
        function createExhaust(x, y) {
            for (let i = 0; i < 5; i++) exhaustParticles.push({x: x - player.facing * 28, y: y + 18, vx: player.facing * -(4 + Math.random()*5), vy: Math.random()*3 - 1.5, life: 18 + Math.random()*12, size: 5 + Math.random()*4, color: Math.random() > 0.5 ? '#ff8800' : '#ffff00'});
        }

        function initLevel() {
            ringsList = [];
            for (let i = 0; i < 18; i++) createRing(288 + i*384, 272 + (i%5)*40);
            enemies = [];
            createEnemy(960, 512); createEnemy(2656, 352); createEnemy(4160, 432);
            createEnemy(5472, 256); createEnemy(6208, 384); createEnemy(7104, 320);

            rocktos = [
                new Rockto(3800, 220),
                new Rockto(6200, 180)
            ];
        }

        const GRAVITY = 0.82;
        let startTime = Date.now();

        function collideHorizontal() {
            for (let p of platforms) {
                if (player.x + player.w > p.x && player.x < p.x + p.w && player.y + player.h > p.y && player.y < p.y + p.h) {
                    if (player.vx > 0) { triggerHaptic('left'); player.x = p.x - player.w; }
                    else if (player.vx < 0) { triggerHaptic('right'); player.x = p.x + p.w; }
                    player.vx = 0;
                }
            }
        }

        function collideVertical() {
            player.onGround = false;
            for (let p of platforms) {
                if (player.x + player.w > p.x && player.x < p.x + p.w && player.y + player.h > p.y && player.y < p.y + p.h) {
                    if (player.vy >= 0 && player.y + player.h - player.vy <= p.y + 14) {
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.onGround = true;
                        coyoteTime = 8;
                        if (Math.abs(player.vx) > 5) createParticle(player.x + 12, player.y + player.h, 5);
                    } else if (player.vy < 0) {
                        player.y = p.y + p.h;
                        player.vy = 0.5;
                    }
                }
            }
        }

        function update() {
            if (!loaded || !levelLoaded) return;

            time = Math.floor((Date.now() - startTime) / 1000);

            let targetVx = 0;
            isBoosting = false;
            let restartPressed = false;

            if (keys['ArrowLeft'] || keys['a'] || keys['A']) targetVx = -8.4;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) targetVx = 8.4;
            if (keys['Shift']) isBoosting = true;

            // Touch controls
            if (touchState.left) targetVx = -8.4;
            if (touchState.right) targetVx = 8.4;
            if (touchState.boost) isBoosting = true;
            if (touchState.jump) jumpBuffer = 8;

            if (mouseRight) targetVx = 8.4;

            const pads = navigator.getGamepads ? navigator.getGamepads() : [];
            for (let gp of pads) {
                if (!gp) continue;
                // Auto-hide touch controls on gamepad input
                if (Math.abs(gp.axes[0]) > 0.2 || gp.buttons.some(b => b.pressed)) onNonTouchInput();
                if (Math.abs(gp.axes[0]) > 0.2) targetVx = gp.axes[0] * 8.4;
                if (gp.buttons[12].pressed) targetVx = -8.4;
                if (gp.buttons[13].pressed) targetVx = 8.4;

                const currentRestart = (gp.buttons[0].pressed || gp.buttons[2].pressed || gp.buttons[9].pressed || gp.buttons[8].pressed);
                if (currentRestart && !prevRestartPressed) restartPressed = true;

                if ((gp.buttons[0].pressed || gp.buttons[2].pressed) && !(gameWon || gameOver)) {
                    if (player.onGround || coyoteTime > 0) {
                        player.vy = -18.2;
                        player.onGround = false;
                        coyoteTime = 0;
                    }
                }

                const rightStickX = gp.axes[2] || 0;
                if (Math.abs(rightStickX) > 0.15) camOffset += rightStickX * 22;
                else camOffset *= 0.82;

                if (gp.buttons[2].pressed) isBoosting = true;

                if (gp.buttons[10].pressed && !usedGamepad) {
                    usedGamepad = true;
                    if (!document.fullscreenElement) canvas.requestFullscreen({navigationUI:'hide'}).catch(()=>{});
                }
            }
            prevRestartPressed = pads.some(gp => gp && (gp.buttons[0].pressed || gp.buttons[2].pressed || gp.buttons[9].pressed || gp.buttons[8].pressed));

            if (targetVx) player.facing = targetVx > 0 ? 1 : -1;

            const maxSpeed = isBoosting ? 15.5 : 8.4;
            const accel = (player.onGround || coyoteTime > 0) ? (isBoosting ? 0.52 : 0.34) : 0.19;

            if (isBoosting && boostKick < 1) boostKick = 1;
            if (boostKick > 0) { player.vx += player.facing * 2.5; boostKick -= 0.08; }

            player.vx += (targetVx * (isBoosting ? 1.6 : 1) - player.vx) * accel;
            if (Math.abs(player.vx) > maxSpeed) player.vx = Math.sign(player.vx) * maxSpeed;

            if ((keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W'])) jumpBuffer = 8;
            if (jumpBuffer > 0) jumpBuffer--;

            if ((player.onGround || coyoteTime > 0) && jumpBuffer > 0) {
                player.vy = -18.2;
                player.onGround = false;
                jumpBuffer = 0;
                coyoteTime = 0;
            }

            player.vy += GRAVITY;

            player.x += player.vx;
            collideHorizontal();

            player.y += player.vy;
            collideVertical();

            if (player.onGround && !previousOnGround) triggerHaptic('land');
            previousOnGround = player.onGround;

            if (player.onGround) coyoteTime = 8;
            if (coyoteTime > 0) coyoteTime--;

            if (player.x < 0) player.x = 0;
            if (player.y > 950) gameOver = true;
            if (player.x > WORLD_W - 280 && !gameWon) gameWon = true;

            if (restartPressed || keys['r'] || keys['R']) {
                player.x = 180; player.y = 380; player.vx = player.vy = 0;
                ringsCollected = 0; time = 0; gameWon = false; gameOver = false;
                startTime = Date.now();
                usedGamepad = false;
                camOffset = 0;
                document.getElementById('rings').textContent = 'RINGS 00';
            }

            const lookAhead = player.vx * (isBoosting ? 18 : 12);
            const targetCam = player.x - SCREEN_W * 0.42 + lookAhead + camOffset;
            camX += (targetCam - camX) * (isBoosting ? 0.38 : 0.32);
            camX = Math.max(0, Math.min(camX, WORLD_W - SCREEN_W));

            if (isBoosting && Math.random() < 0.65) createExhaust(player.x + player.w/2, player.y + 28);
            if (player.onGround && Math.abs(player.vx) > 5.5 && Math.random() < (isBoosting ? 0.8 : 0.45)) {
                createParticle(player.x + (player.facing * 12), player.y + player.h - 4, isBoosting ? 8 : 4);
            }

            const now = Date.now();
            const fps = Math.max(8, Math.min(32, Math.abs(player.vx) * 2.2));
            if (now - lastAnimTime > 1000 / fps) {
                currentFrame = (currentFrame + 1) % TOTAL_FRAMES;
                lastAnimTime = now;
            }

            for (let i = particles.length-1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
            for (let i = exhaustParticles.length-1; i >= 0; i--) {
                let p = exhaustParticles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life--;
                if (p.life <= 0) exhaustParticles.splice(i, 1);
            }

            for (let r of ringsList) {
                if (!r.collected) {
                    r.bob = Math.sin(Date.now() / 140) * 5;
                    if (Math.hypot(player.x + player.w/2 - r.x, player.y + 24 - (r.y + r.bob)) < 32) {
                        r.collected = true;
                        ringsCollected++;
                        document.getElementById('rings').textContent = `RINGS ${ringsCollected.toString().padStart(2,'0')}`;
                    }
                }
            }

            for (let rock of rocktos) {
                rock.update();
                if (rock.checkCollision()) gameOver = true;
            }

            for (let e of enemies) {
                e.x += e.vx;
                if (Math.random() < 0.018) e.vx *= -1;
                if (Math.abs(player.x + player.w/2 - (e.x + e.w/2)) < 37 && Math.abs(player.y + player.h/2 - (e.y + e.h/2)) < 39) gameOver = true;
            }
        }

        canvas.addEventListener('mousedown', e => {
            if (e.button === 0) jumpBuffer = 8;
            if (e.button === 2) mouseRight = true;
        });

        canvas.addEventListener('mouseup', e => {
            if (e.button === 2) mouseRight = false;
        });

        canvas.addEventListener('contextmenu', e => e.preventDefault());

        function drawPlayer() {
            let px = player.x - camX;
            let py = player.y;

            ctx.save();
            ctx.translate(px + player.w/2, py + 32);
            ctx.scale(player.facing, 1);

            if (motorcycleLoaded) {
                const sx = currentFrame * FRAME_WIDTH;
                ctx.drawImage(
                    playerSprite,
                    sx, 0, FRAME_WIDTH, FRAME_HEIGHT,
                    -FRAME_WIDTH/2, -FRAME_HEIGHT/2 + 18,
                    FRAME_WIDTH, FRAME_HEIGHT
                );
            } else {
                ctx.fillStyle = '#ff3366';
                ctx.fillRect(-30, -30, 60, 60);
                ctx.fillStyle = '#ffffff';
                ctx.font = '12px Arial';
                ctx.fillText('IMG ERR', -25, 5);
            }

            ctx.restore();
        }

        function draw() {
            ctx.fillStyle = '#0b1f0b';
            ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);

            if (!levelLoaded) {
                ctx.fillStyle = '#0f0';
                ctx.font = 'bold 42px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('LOADING LEVEL...', SCREEN_W/2, SCREEN_H/2);
                return;
            }

            ctx.save();
            ctx.translate(-Math.floor(camX * 0.55), 0);
            ctx.fillStyle = '#132e13';
            ctx.fillRect(0, 260, WORLD_W, 480);
            ctx.restore();

            ctx.save();
            ctx.translate(-Math.floor(camX), 0);

            if (tilesLoaded) {
                ctx.drawImage(fg, 0, 0);
            } else {
                ctx.fillStyle = '#444';
                ctx.fillRect(0, 300, WORLD_W, 300);
                ctx.fillStyle = '#888';
                ctx.font = 'bold 32px Courier New';
                ctx.fillText('TILES MISSING', 200, 450);
            }

            for (let r of ringsList) if (!r.collected) {
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath(); ctx.arc(r.x, r.y + r.bob, 15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#f39c12';
                ctx.beginPath(); ctx.arc(r.x, r.y + r.bob, 10, 0, Math.PI*2); ctx.fill();
            }

            for (let e of enemies) {
                let ex = e.x - camX;
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(ex, e.y, e.w, e.h);
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(ex + 6, e.y + 8, 24, 14);
            }

            for (let rock of rocktos) {
                rock.draw();
            }

            drawPlayer();

            ctx.fillStyle = '#f1c40f';
            for (let p of particles) {
                ctx.globalAlpha = p.life / 35;
                ctx.fillRect(p.x - camX, p.y, p.size, p.size);
            }
            for (let p of exhaustParticles) {
                ctx.globalAlpha = p.life / 25;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - camX, p.y, p.size, p.size);
            }
            ctx.globalAlpha = 1;

            ctx.restore();

            if (showDebug) {
                ctx.save();
                ctx.translate(-Math.floor(camX), 0);
                ctx.strokeStyle = '#f38630';
                ctx.lineWidth = 2;
                for (let p of platforms) ctx.strokeRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = '#0f0';
                ctx.strokeRect(player.x, player.y, player.w, player.h);
                ctx.restore();
            }

            if (gameWon || gameOver) {
                ctx.fillStyle = gameWon ? 'rgba(0,40,0,0.9)' : 'rgba(40,0,0,0.9)';
                ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
                ctx.fillStyle = gameWon ? '#0f0' : '#f00';
                ctx.font = 'bold 58px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText(gameWon ? 'STAGE CLEAR!' : 'GAME OVER', SCREEN_W/2, 240);
                ctx.font = '28px Courier New';
                ctx.fillText(`RINGS ${ringsCollected}   TIME ${time}`, SCREEN_W/2, 300);
                ctx.font = '18px Courier New';
                ctx.fillText('Press R or A/X or START to restart', SCREEN_W/2, 370);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        canvas.addEventListener('mousedown', e => {
            if (e.button === 0) jumpBuffer = 8;
            if (e.button === 2) mouseRight = true;
        });

        canvas.addEventListener('mouseup', e => {
            if (e.button === 2) mouseRight = false;
        });

        canvas.addEventListener('contextmenu', e => e.preventDefault());

        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key.toLowerCase() === 'f') {
                if (!document.fullscreenElement) canvas.requestFullscreen({navigationUI:'hide'}).catch(()=>{});
                else document.exitFullscreen();
            }
            if (e.key === 'd' || e.key === 'D') showDebug = !showDebug;
        });

        window.addEventListener('keyup', e => keys[e.key] = false);

        // --- Touch controls with auto-hide ---
        const touchControls = document.getElementById('touch-controls');
        const touchState = { left: false, right: false, jump: false, boost: false };
        let touchHideTimer = null;
        let inputMode = 'none'; // 'none' | 'touch' | 'keyboard' | 'gamepad'

        function showTouchControls() {
            touchControls.classList.add('visible');
            touchControls.classList.remove('hidden');
        }

        function hideTouchControls() {
            touchControls.classList.add('hidden');
        }

        // Detect touch-capable device and show controls initially
        function detectTouch() {
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                inputMode = 'touch';
                showTouchControls();
            }
        }

        function onNonTouchInput() {
            if (inputMode === 'touch') {
                inputMode = 'keyboard';
                hideTouchControls();
            } else if (inputMode === 'none') {
                inputMode = 'keyboard';
            }
        }

        function onTouchInput() {
            inputMode = 'touch';
            showTouchControls();
            // Clear any pending hide
            if (touchHideTimer) { clearTimeout(touchHideTimer); touchHideTimer = null; }
        }

        // Hook into existing keyboard listeners to detect non-touch input
        window.addEventListener('keydown', () => onNonTouchInput());

        // Wire up touch buttons
        function bindTouchButton(id, stateKey) {
            const el = document.getElementById(id);

            el.addEventListener('touchstart', e => {
                e.preventDefault();
                touchState[stateKey] = true;
                el.classList.add('pressed');
                onTouchInput();
            }, { passive: false });

            el.addEventListener('touchend', e => {
                e.preventDefault();
                touchState[stateKey] = false;
                el.classList.remove('pressed');
            }, { passive: false });

            el.addEventListener('touchcancel', e => {
                touchState[stateKey] = false;
                el.classList.remove('pressed');
            });
        }

        bindTouchButton('touch-left', 'left');
        bindTouchButton('touch-right', 'right');
        bindTouchButton('touch-jump', 'jump');
        bindTouchButton('touch-boost', 'boost');

        window.onload = () => {
            startTime = Date.now();
            initLevel();
            detectTouch();
            loop();
        };
    </script>
</body>
</html>
