<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Metallic Madness Zone 1 - Bad Future</title>
    <style>
        body { margin:0; background:#000; overflow:hidden; font-family:'Courier New', monospace; }
        canvas { display:block; margin:20px auto; image-rendering:pixelated; border:8px solid #111; box-shadow:0 0 40px #0a3;}
        #ui { position:absolute; top:15px; left:15px; color:#0f0; text-shadow:2px 2px 0 #000; pointer-events:none; font-size:22px; line-height:1.1; letter-spacing:2px; }
        #instructions { position:absolute; bottom:15px; left:15px; color:#0f0; text-shadow:2px 2px 0 #000; pointer-events:none; font-size:14px; line-height:1.4; }
    </style>
</head>
<body>
    <div id="ui">
        METALLIC MADNESS<br>
        <span id="rings">RINGS 00</span>  TIME <span id="time">000</span>
    </div>
    <div id="instructions">
        ← → / A D = Move  SPACE / ↑ = Jump<br>
        GAMEPAD: Left Stick / D-Pad = Move  A / X (bottom face) = Jump  Any button = Fullscreen
    </div>
    <canvas id="c" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const SCREEN_W = 800;
        const SCREEN_H = 600;
        const TILE_SIZE = 32;   // ← tiles from your tilemap (tiles.png)

        let WORLD_W = 8240;

        const player = {
            x: 120, y: 400, vx: 0, vy: 0,
            w: 38, h: 48,
            facing: 1,
            onGround: false
        };

        let ringsCollected = 0;
        let time = 0;
        let gameWon = false;
        let gameOver = false;
        let showDebug = false;
        let usedGamepad = false;   // for auto-fullscreen on first gamepad press

        const keys = {};
        let particles = [];
        let ringsList = [];
        let enemies = [];
        let platforms = [];
        let spikes = [];
        let slopes = [];

        const fg = new Image();
        fg.src = 'http://easierbycode.com/assets/spritesheets/tiles.png';

        let loaded = false;
        fg.onload = () => {
            WORLD_W = fg.width || 8240;
            console.log('%c✅ Metallic Madness loaded — ' + WORLD_W + 'px wide', 'color:#0f0;font-size:16px');
            loaded = true;
            initLevel();
        };

        function createRing(x, y) { ringsList.push({x, y, collected: false, bob: 0}); }
        function createEnemy(x, y) { enemies.push({x, y, vx: -1.8, w: 36, h: 36}); }
        function createParticle(x, y) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: x + Math.random()*20-10,
                    y: y + 22,
                    vx: Math.random()*7-3.5,
                    vy: Math.random()*-5-2,
                    life: 28 + Math.random()*12,
                    size: 4 + Math.random()*4
                });
            }
        }

        function initLevel() {
            // Tile-snapped platforms (32px grid from your tilemap)
            platforms = [
                {x:0, y:528, w:WORLD_W, h:160}, // main floor (snapped)
                {x:128, y:448, w:480, h:32}, {x:704, y:384, w:288, h:32},
                {x:1056, y:480, w:416, h:32}, {x:1536, y:352, w:352, h:32},
                {x:1984, y:448, w:320, h:32}, {x:2336, y:288, w:480, h:32},
                {x:2912, y:416, w:288, h:32}, {x:3232, y:256, w:576, h:32},
                {x:3904, y:384, w:384, h:32}, {x:4352, y:320, w:320, h:32},
                {x:4736, y:448, w:416, h:32}, {x:5248, y:288, w:480, h:32},
                {x:5792, y:384, w:736, h:32}, {x:6144, y:320, w:256, h:32},
                {x:6496, y:448, w:352, h:32}, {x:7200, y:320, w:448, h:32},
                // small tile ledges (all snapped to 32px grid)
                {x:480, y:480, w:160, h:32}, {x:1184, y:320, w:160, h:32},
                {x:2688, y:352, w:192, h:32}, {x:3776, y:288, w:160, h:32},
                {x:4480, y:352, w:96, h:32}, {x:4960, y:384, w:160, h:32},
                {x:5600, y:256, w:128, h:32}, {x:6816, y:352, w:192, h:32},
                {x:800, y:416, w:96, h:32}, {x:1408, y:384, w:128, h:32},
                {x:1824, y:288, w:128, h:32}, {x:2144, y:416, w:96, h:32},
                {x:3104, y:320, w:160, h:32}, {x:3552, y:256, w:96, h:32},
                {x:4000, y:320, w:128, h:32}, {x:4608, y:384, w:96, h:32},
                {x:5088, y:224, w:160, h:32}, {x:5952, y:352, w:96, h:32},
                {x:6272, y:288, w:160, h:32}, {x:6944, y:384, w:128, h:32},
                {x:7392, y:288, w:192, h:32}
            ];

            spikes = [
                {x:608, y:512, w:96, h:32}, {x:1472, y:512, w:64, h:32},
                {x:2624, y:512, w:96, h:32}, {x:4128, y:512, w:64, h:32},
                {x:5440, y:512, w:96, h:32}, {x:6176, y:512, w:64, h:32}
            ];

            slopes = [
                {x: 640, y: 512, width: 256, rise: -128},
                {x: 1920, y: 448, width: 192, rise: 128},
                {x: 3232, y: 352, width: 256, rise: -160},
                {x: 4736, y: 416, width: 192, rise: 96},
                {x: 5792, y: 384, width: 224, rise: -128},
                {x: 6784, y: 352, width: 256, rise: 144}
            ];

            ringsList = [];
            for (let i = 0; i < 18; i++) {
                createRing(288 + i*384, 272 + (i%5)*40);
            }

            enemies = [];
            createEnemy(960, 512); createEnemy(2656, 352);
            createEnemy(4160, 432); createEnemy(5472, 256);
            createEnemy(6208, 384); createEnemy(7104, 320);
        }

        const GRAVITY = 0.88;
        let camX = 0;
        let startTime = Date.now();

        function collideHorizontal() {
            for (let p of platforms) {
                if (!(player.x + player.w > p.x && player.x < p.x + p.w &&
                      player.y + player.h > p.y && player.y < p.y + p.h)) continue;
                if (player.vx > 0) { player.x = p.x - player.w; player.vx = 0; }
                else if (player.vx < 0) { player.x = p.x + p.w; player.vx = 0; }
            }
        }

        function collideVertical() {
            player.onGround = false;
            for (let p of platforms) {
                if (!(player.x + player.w > p.x && player.x < p.x + p.w &&
                      player.y + player.h > p.y && player.y < p.y + p.h)) continue;
                if (player.vy >= 0 && player.y + player.h - player.vy <= p.y + 12) {
                    player.y = p.y - player.h;
                    player.vy = 0;
                    player.onGround = true;
                    if (Math.abs(player.vx) > 4) createParticle(player.x + 10, player.y + player.h);
                } else if (player.vy < 0) {
                    player.y = p.y + p.h;
                    player.vy = 0.6;
                }
            }
            for (let s of spikes) {
                if (player.x + player.w > s.x && player.x < s.x + s.w &&
                    player.y + player.h > s.y && player.y < s.y + s.h) gameOver = true;
            }
        }

        function resolveSlopes() {
            for (let s of slopes) {
                const pLeft = player.x;
                const pRight = player.x + player.w;
                if (pRight < s.x || pLeft > s.x + s.width) continue;
                const frac = Math.max(0, Math.min(1, (player.x + player.w/2 - s.x) / s.width));
                const slopeY = s.y + frac * s.rise;
                const playerBottom = player.y + player.h;
                if (playerBottom > slopeY - 26 && playerBottom < slopeY + 20 && player.vy >= -3) {
                    player.y = slopeY - player.h;
                    player.vy = 0;
                    player.onGround = true;
                    const slopeFactor = s.rise / s.width;
                    if (Math.abs(slopeFactor) > 0.3) player.vx += slopeFactor * 4.5;
                    if (s.rise < 0) player.vx *= 1.06;
                    else player.vx *= 0.97;
                    createParticle(player.x + 15, player.y + player.h - 4);
                    return;
                }
            }
        }

        function update() {
            if (!loaded || gameWon || gameOver) return;

            time = Math.floor((Date.now() - startTime) / 1000);

            // === KEYBOARD ===
            let targetVx = 0;
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) targetVx = -8.2;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) targetVx = 8.2;
            if (targetVx) player.facing = targetVx > 0 ? 1 : -1;

            // === GAMEPAD ===
            const pads = navigator.getGamepads ? navigator.getGamepads() : [];
            for (let gp of pads) {
                if (!gp || !gp.connected) continue;

                // Movement (stick + D-pad)
                let gpVx = 0;
                if (Math.abs(gp.axes[0]) > 0.25) gpVx = gp.axes[0] * 8.2;
                if (gp.buttons[12].pressed) gpVx = -8.2; // D-pad left
                if (gp.buttons[13].pressed) gpVx = 8.2;  // D-pad right
                if (gpVx) {
                    targetVx = gpVx;
                    player.facing = gpVx > 0 ? 1 : -1;
                }

                // Jump - BOTTOM FACE BUTTON (A on Xbox, X on PS, B on Switch)
                if (gp.buttons[0].pressed && player.onGround) {
                    player.vy = -17.5;
                    player.onGround = false;
                }

                // Auto-fullscreen on FIRST gamepad button press
                let anyPressed = false;
                for (let b = 0; b < gp.buttons.length; b++) {
                    if (gp.buttons[b].pressed) anyPressed = true;
                }
                if (anyPressed && !usedGamepad) {
                    usedGamepad = true;
                    if (!document.fullscreenElement) {
                        canvas.requestFullscreen({ navigationUI: "hide" }).catch(() => {});
                    }
                }
            }

            const accel = player.onGround ? 0.28 : 0.16;
            player.vx += (targetVx - player.vx) * accel;

            if ((keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W']) && player.onGround) {
                player.vy = -17.5;
                player.onGround = false;
            }

            player.vy += GRAVITY;

            player.x += player.vx;
            collideHorizontal();

            player.y += player.vy;
            collideVertical();
            resolveSlopes();

            // rings / enemies / bounds / camera / particles (unchanged)
            for (let r of ringsList) {
                if (!r.collected) {
                    r.bob = Math.sin(Date.now() / 140) * 5;
                    if (Math.hypot(player.x + player.w/2 - r.x, player.y + 24 - (r.y + r.bob)) < 32) {
                        r.collected = true;
                        ringsCollected++;
                        document.getElementById('rings').textContent = `RINGS ${ringsCollected.toString().padStart(2,'0')}`;
                    }
                }
            }

            for (let e of enemies) {
                e.x += e.vx;
                if (Math.random() < 0.018) e.vx *= -1;
                if (Math.abs(player.x + player.w/2 - (e.x + e.w/2)) < 37 &&
                    Math.abs(player.y + player.h/2 - (e.y + e.h/2)) < 39) gameOver = true;
            }

            if (player.x < 0) player.x = 0;
            if (player.y > 900) gameOver = true;
            if (player.x > WORLD_W - 300 && !gameWon) gameWon = true;

            let targetCam = player.x - SCREEN_W * 0.45;
            camX += (targetCam - camX) * 0.13;
            camX = Math.max(0, Math.min(camX, WORLD_W - SCREEN_W));

            for (let i = particles.length-1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.32; p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawPlayer() {
            let px = player.x - camX;
            let py = player.y;
            ctx.save();
            ctx.translate(px + player.w/2, py + player.h/2 - 3);
            ctx.scale(player.facing, 1);
            ctx.fillStyle = '#c0392b'; ctx.fillRect(-18, 19, 36, 13);
            ctx.fillStyle = '#2980b9'; ctx.fillRect(-15, -9, 30, 30);
            ctx.fillStyle = '#ecf0f1'; ctx.fillRect(-12, -5, 24, 18);
            ctx.fillStyle = '#2980b9';
            ctx.beginPath(); ctx.arc(0, -23, 17, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(-19, -27, 8, 15); ctx.fillRect(-13, -31, 7, 13);
            ctx.fillStyle = '#fff';
            ctx.fillRect(6, -26, 12, 10);
            ctx.fillStyle = '#111';
            ctx.fillRect(11, -23, 6, 6);
            ctx.restore();
        }

        function draw() {
            ctx.fillStyle = '#0b1f0b';
            ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);

            ctx.save();
            ctx.translate(-Math.floor(camX * 0.55), 0);
            ctx.fillStyle = '#132e13';
            ctx.fillRect(0, 260, WORLD_W, 480);
            ctx.restore();

            ctx.save();
            ctx.translate(-Math.floor(camX), 0);

            if (loaded) ctx.drawImage(fg, 0, 0);

            // rings
            for (let r of ringsList) if (!r.collected) {
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath(); ctx.arc(r.x, r.y + r.bob, 15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#f39c12';
                ctx.beginPath(); ctx.arc(r.x, r.y + r.bob, 10, 0, Math.PI*2); ctx.fill();
            }

            // enemies & spikes
            for (let e of enemies) {
                let ex = e.x - camX;
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(ex, e.y, e.w, e.h);
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(ex + 6, e.y + 8, 24, 14);
            }
            ctx.fillStyle = '#e74c3c';
            for (let s of spikes) {
                let sx = s.x - camX;
                ctx.fillRect(sx, s.y, s.w, s.h);
                ctx.fillStyle = '#fff';
                for (let i = 0; i < s.w; i += 12) ctx.fillRect(sx + i + 4, s.y - 8, 4, 10);
                ctx.fillStyle = '#e74c3c';
            }

            drawPlayer();

            // particles
            ctx.fillStyle = '#f1c40f';
            for (let p of particles) {
                ctx.globalAlpha = p.life / 40;
                ctx.fillRect(p.x - camX, p.y, p.size, p.size);
            }
            ctx.globalAlpha = 1;

            // tile-debug (orange tiles + cyan slopes)
            if (showDebug) {
                ctx.strokeStyle = '#f38630';
                ctx.lineWidth = 2;
                for (let p of platforms) ctx.strokeRect(p.x - camX, p.y, p.w, p.h);
                ctx.strokeStyle = '#e74c3c';
                for (let s of spikes) ctx.strokeRect(s.x - camX, s.y, s.w, s.h);
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 4;
                for (let s of slopes) {
                    ctx.beginPath();
                    ctx.moveTo(s.x - camX, s.y);
                    ctx.lineTo(s.x + s.width - camX, s.y + s.rise);
                    ctx.stroke();
                }
                ctx.strokeStyle = '#0f0';
                ctx.strokeRect(player.x - camX, player.y, player.w, player.h);
            }

            ctx.restore();

            if (gameWon || gameOver) {
                ctx.fillStyle = gameWon ? 'rgba(0,40,0,0.9)' : 'rgba(40,0,0,0.9)';
                ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
                ctx.fillStyle = gameWon ? '#0f0' : '#f00';
                ctx.font = 'bold 58px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText(gameWon ? 'STAGE CLEAR!' : 'GAME OVER', SCREEN_W/2, 240);
                ctx.font = '28px Courier New';
                ctx.fillText(`RINGS ${ringsCollected}   TIME ${time}`, SCREEN_W/2, 300);
                ctx.font = '18px Courier New';
                ctx.fillText('Press R to restart', SCREEN_W/2, 370);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key.toLowerCase() === 'f') {
                if (!document.fullscreenElement) canvas.requestFullscreen({navigationUI:'hide'}).catch(()=>{});
                else document.exitFullscreen();
            }
            if (e.key === 'd' || e.key === 'D') showDebug = !showDebug;
            if ((e.key === 'r' || e.key === 'R') && (gameWon || gameOver)) {
                player.x = 120; player.y = 400; player.vx = player.vy = 0;
                ringsCollected = 0; time = 0; gameWon = false; gameOver = false;
                startTime = Date.now();
                usedGamepad = false;
                document.getElementById('rings').textContent = 'RINGS 00';
            }
        });
        window.addEventListener('keyup', e => keys[e.key] = false);

        window.onload = () => {
            startTime = Date.now();
            loop();
        };
    </script>
</body>
</html>
