<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Metallic Madness Zone 1 - Bad Future</title>
    <style>
        body { margin:0; background:#000; overflow:hidden; font-family:'Courier New', monospace; }
        canvas { display:block; margin:20px auto; image-rendering:pixelated; border:8px solid #111; box-shadow:0 0 40px #0a3;}
        #ui { position:absolute; top:15px; left:15px; color:#0f0; text-shadow:2px 2px 0 #000; pointer-events:none; font-size:22px; line-height:1.1; letter-spacing:2px; }
        #instructions { position:absolute; bottom:15px; left:15px; color:#0f0; text-shadow:2px 2px 0 #000; pointer-events:none; font-size:14px; line-height:1.4; }
    </style>
</head>
<body>
    <div id="ui">
        METALLIC MADNESS<br>
        <span id="rings">RINGS 00</span>  TIME <span id="time">000</span>
    </div>
    <div id="instructions">
        ← → / A D = Move  SPACE / ↑ = Jump  SHIFT / X = BOOST<br>
        Right Analog = Camera  L3 = Fullscreen  A/X or START/OPTIONS = Restart
    </div>
    <canvas id="c" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const SCREEN_W = 800;
        const SCREEN_H = 600;

        let TILE_SIZE = 16;
        let WORLD_W = 8448;
        let numCols = 528;
        let numRows = 128;
        let map = [];

        const player = { x: 120, y: 400, vx: 0, vy: 0, w: 38, h: 48, facing: 1, onGround: false };

        let ringsCollected = 0, time = 0, gameWon = false, gameOver = false, showDebug = false, usedGamepad = false;
        let camX = 0, camOffset = 0;

        const keys = {};
        let particles = [], exhaustParticles = [], ringsList = [], enemies = [], platforms = [];

        let coyoteTime = 0, jumpBuffer = 0, isBoosting = false, boostKick = 0;

        const playerSprite = new Image();
        playerSprite.src = 'http://easierbycode.com/assets/spritesheets/motorcycle.png';

        let currentFrame = 0, lastAnimTime = Date.now();
        const FRAME_WIDTH = 86, FRAME_HEIGHT = 46, TOTAL_FRAMES = 10;

        const fg = new Image();
        fg.src = 'http://easierbycode.com/assets/spritesheets/tiles.png';

        let loaded = false, levelLoaded = false;

        // Gamepad restart edge detection
        let prevRestartPressed = false;

        fg.onload = () => loaded = true;

        // Load real level data
        fetch('https://easierbycode.com/assets/spritesheets/level_data.json')
            .then(r => r.json())
            .then(data => {
                map = data.map;
                numCols = data.numCols || 528;
                numRows = data.numRows || 128;
                TILE_SIZE = 16;
                WORLD_W = numCols * TILE_SIZE;
                generateCollisionFromMap();
                levelLoaded = true;
                console.log('%c✅ Real level loaded — ' + numCols + '×' + numRows + ' tiles', 'color:#0f0;font-size:16px');
            });

        function generateCollisionFromMap() {
            platforms = [];
            for (let y = 0; y < numRows; y++) {
                let start = -1;
                for (let x = 0; x <= numCols; x++) {
                    const tile = map[y * numCols + x];
                    const solid = tile !== 2 && tile !== 0 && tile !== undefined;
                    if (solid && start === -1) start = x;
                    else if (!solid && start !== -1) {
                        platforms.push({ x: start * TILE_SIZE, y: y * TILE_SIZE, w: (x - start) * TILE_SIZE, h: TILE_SIZE });
                        start = -1;
                    }
                }
                if (start !== -1) platforms.push({ x: start * TILE_SIZE, y: y * TILE_SIZE, w: (numCols - start) * TILE_SIZE, h: TILE_SIZE });
            }
        }

        function createRing(x, y) { ringsList.push({x, y, collected: false, bob: 0}); }
        function createEnemy(x, y) { enemies.push({x, y, vx: -1.8, w: 36, h: 36}); }
        function createParticle(x, y, count = 8) {
            for (let i = 0; i < count; i++) particles.push({x: x + Math.random()*25-12, y: y + Math.random()*4, vx: Math.random()*7-3.5, vy: Math.random()*-4-1, life: 22 + Math.random()*14, size: 3.5 + Math.random()*3});
        }
        function createExhaust(x, y) {
            for (let i = 0; i < 5; i++) exhaustParticles.push({x: x - player.facing * 28, y: y + 18, vx: player.facing * -(4 + Math.random()*5), vy: Math.random()*3 - 1.5, life: 18 + Math.random()*12, size: 5 + Math.random()*4, color: Math.random() > 0.5 ? '#ff8800' : '#ffff00'});
        }

        function initLevel() {
            ringsList = [];
            for (let i = 0; i < 18; i++) createRing(288 + i*384, 272 + (i%5)*40);
            enemies = [];
            createEnemy(960, 512); createEnemy(2656, 352); createEnemy(4160, 432);
            createEnemy(5472, 256); createEnemy(6208, 384); createEnemy(7104, 320);
        }

        const GRAVITY = 0.82;
        let startTime = Date.now();

        function collideHorizontal() {
            for (let p of platforms) {
                if (player.x + player.w > p.x && player.x < p.x + p.w && player.y + player.h > p.y && player.y < p.y + p.h) {
                    if (player.vx > 0) player.x = p.x - player.w;
                    else if (player.vx < 0) player.x = p.x + p.w;
                    player.vx = 0;
                }
            }
        }

        function collideVertical() {
            player.onGround = false;
            for (let p of platforms) {
                if (player.x + player.w > p.x && player.x < p.x + p.w && player.y + player.h > p.y && player.y < p.y + p.h) {
                    if (player.vy >= 0 && player.y + player.h - player.vy <= p.y + 14) {
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.onGround = true;
                        coyoteTime = 8;
                        if (Math.abs(player.vx) > 5) createParticle(player.x + 12, player.y + player.h, 5);
                    } else if (player.vy < 0) {
                        player.y = p.y + p.h;
                        player.vy = 0.5;
                    }
                }
            }
        }

        function update() {
            if (!loaded || !levelLoaded || gameWon || gameOver) return;

            time = Math.floor((Date.now() - startTime) / 1000);

            let targetVx = 0;
            isBoosting = false;
            let restartPressed = false;

            // Keyboard
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) targetVx = -8.4;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) targetVx = 8.4;
            if (keys['Shift']) isBoosting = true;

            // Gamepad
            const pads = navigator.getGamepads ? navigator.getGamepads() : [];
            for (let gp of pads) {
                if (!gp) continue;

                if (Math.abs(gp.axes[0]) > 0.2) targetVx = gp.axes[0] * 8.4;
                if (gp.buttons[12].pressed) targetVx = -8.4;
                if (gp.buttons[13].pressed) targetVx = 8.4;

                // Restart buttons (A/X + Start/Options)
                const currentRestart = (gp.buttons[0].pressed || gp.buttons[2].pressed || gp.buttons[9].pressed || gp.buttons[8].pressed);
                if (currentRestart && !prevRestartPressed) restartPressed = true;

                // Jump (only when alive)
                if ((gp.buttons[0].pressed || gp.buttons[2].pressed) && !(gameWon || gameOver)) {
                    if (player.onGround || coyoteTime > 0) {
                        player.vy = -18.2;
                        player.onGround = false;
                        coyoteTime = 0;
                    }
                }

                // Right analog camera
                const rightStickX = gp.axes[2] || 0;
                if (Math.abs(rightStickX) > 0.15) camOffset += rightStickX * 22;
                else camOffset *= 0.82;

                if (gp.buttons[2].pressed) isBoosting = true;

                if (gp.buttons[10].pressed && !usedGamepad) {
                    usedGamepad = true;
                    if (!document.fullscreenElement) canvas.requestFullscreen({navigationUI:'hide'}).catch(()=>{});
                }
            }
            prevRestartPressed = (pads.length > 0 && (pads[0] && (pads[0].buttons[0].pressed || pads[0].buttons[2].pressed || pads[0].buttons[9].pressed || pads[0].buttons[8].pressed)));

            if (targetVx) player.facing = targetVx > 0 ? 1 : -1;

            const maxSpeed = isBoosting ? 15.5 : 8.4;
            const accel = (player.onGround || coyoteTime > 0) ? (isBoosting ? 0.52 : 0.34) : 0.19;

            if (isBoosting && boostKick < 1) boostKick = 1;
            if (boostKick > 0) { player.vx += player.facing * 2.5; boostKick -= 0.08; }

            player.vx += (targetVx * (isBoosting ? 1.6 : 1) - player.vx) * accel;
            if (Math.abs(player.vx) > maxSpeed) player.vx = Math.sign(player.vx) * maxSpeed;

            if ((keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W'])) jumpBuffer = 8;
            if (jumpBuffer > 0) jumpBuffer--;

            if ((player.onGround || coyoteTime > 0) && jumpBuffer > 0) {
                player.vy = -18.2;
                player.onGround = false;
                jumpBuffer = 0;
                coyoteTime = 0;
            }

            player.vy += GRAVITY;

            player.x += player.vx;
            collideHorizontal();

            player.y += player.vy;
            collideVertical();

            if (player.onGround) coyoteTime = 8;
            if (coyoteTime > 0) coyoteTime--;

            if (player.x < 0) player.x = 0;
            if (player.y > 950) gameOver = true;
            if (player.x > WORLD_W - 280 && !gameWon) gameWon = true;

            // Restart (gamepad or R key)
            if ((gameWon || gameOver) && (restartPressed || keys['r'] || keys['R'])) {
                player.x = 120; player.y = 400; player.vx = player.vy = 0;
                ringsCollected = 0; time = 0; gameWon = false; gameOver = false;
                startTime = Date.now();
                usedGamepad = false;
                document.getElementById('rings').textContent = 'RINGS 00';
                camOffset = 0;
                prevRestartPressed = true; // prevent double-trigger
            }

            // FIXED CAMERA - much more responsive (Sonic CD style)
            const lookAhead = player.vx * (isBoosting ? 18 : 12);
            const targetCam = player.x - SCREEN_W * 0.42 + lookAhead + camOffset;
            camX += (targetCam - camX) * (isBoosting ? 0.38 : 0.32);   // stronger lerp
            camX = Math.max(0, Math.min(camX, WORLD_W - SCREEN_W));

            // Particles
            if (isBoosting && Math.random() < 0.65) createExhaust(player.x + player.w/2, player.y + 28);
            if (player.onGround && Math.abs(player.vx) > 5.5 && Math.random() < (isBoosting ? 0.8 : 0.45)) {
                createParticle(player.x + (player.facing * 12), player.y + player.h - 4, isBoosting ? 8 : 4);
            }

            const now = Date.now();
            const fps = Math.max(8, Math.min(32, Math.abs(player.vx) * 2.2));
            if (now - lastAnimTime > 1000 / fps) {
                currentFrame = (currentFrame + 1) % TOTAL_FRAMES;
                lastAnimTime = now;
            }

            for (let i = particles.length-1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
            for (let i = exhaustParticles.length-1; i >= 0; i--) {
                let p = exhaustParticles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life--;
                if (p.life <= 0) exhaustParticles.splice(i, 1);
            }

            for (let r of ringsList) {
                if (!r.collected) {
                    r.bob = Math.sin(Date.now() / 140) * 5;
                    if (Math.hypot(player.x + player.w/2 - r.x, player.y + 24 - (r.y + r.bob)) < 32) {
                        r.collected = true;
                        ringsCollected++;
                        document.getElementById('rings').textContent = `RINGS ${ringsCollected.toString().padStart(2,'0')}`;
                    }
                }
            }
            for (let e of enemies) {
                e.x += e.vx;
                if (Math.random() < 0.018) e.vx *= -1;
                if (Math.abs(player.x + player.w/2 - (e.x + e.w/2)) < 37 &&
                    Math.abs(player.y + player.h/2 - (e.y + e.h/2)) < 39) gameOver = true;
            }
        }

        function drawPlayer() {
            if (!playerSprite.complete) return;
            let px = player.x - camX;
            let py = player.y;
            ctx.save();
            ctx.translate(px + player.w/2, py + 32);
            ctx.scale(player.facing, 1);
            const sx = currentFrame * FRAME_WIDTH;
            ctx.drawImage(playerSprite, sx, 0, FRAME_WIDTH, FRAME_HEIGHT, -FRAME_WIDTH/2, -FRAME_HEIGHT/2 + 18, FRAME_WIDTH, FRAME_HEIGHT);
            ctx.restore();
        }

        function draw() {
            ctx.fillStyle = '#0b1f0b';
            ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);

            ctx.save();
            ctx.translate(-Math.floor(camX * 0.55), 0);
            ctx.fillStyle = '#132e13';
            ctx.fillRect(0, 260, WORLD_W, 480);
            ctx.restore();

            ctx.save();
            ctx.translate(-Math.floor(camX), 0);

            if (loaded) ctx.drawImage(fg, 0, 0);

            for (let r of ringsList) if (!r.collected) {
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath(); ctx.arc(r.x, r.y + r.bob, 15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#f39c12';
                ctx.beginPath(); ctx.arc(r.x, r.y + r.bob, 10, 0, Math.PI*2); ctx.fill();
            }

            for (let e of enemies) {
                let ex = e.x - camX;
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(ex, e.y, e.w, e.h);
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(ex + 6, e.y + 8, 24, 14);
            }

            drawPlayer();

            ctx.fillStyle = '#f1c40f';
            for (let p of particles) {
                ctx.globalAlpha = p.life / 35;
                ctx.fillRect(p.x - camX, p.y, p.size, p.size);
            }
            for (let p of exhaustParticles) {
                ctx.globalAlpha = p.life / 25;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - camX, p.y, p.size, p.size);
            }
            ctx.globalAlpha = 1;

            if (showDebug) {
                ctx.strokeStyle = '#f38630';
                ctx.lineWidth = 2;
                for (let p of platforms) ctx.strokeRect(p.x - camX, p.y, p.w, p.h);
                ctx.strokeStyle = '#0f0';
                ctx.strokeRect(player.x - camX, player.y, player.w, player.h);
            }

            ctx.restore();

            if (gameWon || gameOver) {
                ctx.fillStyle = gameWon ? 'rgba(0,40,0,0.9)' : 'rgba(40,0,0,0.9)';
                ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
                ctx.fillStyle = gameWon ? '#0f0' : '#f00';
                ctx.font = 'bold 58px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText(gameWon ? 'STAGE CLEAR!' : 'GAME OVER', SCREEN_W/2, 240);
                ctx.font = '28px Courier New';
                ctx.fillText(`RINGS ${ringsCollected}   TIME ${time}`, SCREEN_W/2, 300);
                ctx.font = '18px Courier New';
                ctx.fillText('A/X or START to restart', SCREEN_W/2, 370);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        window.addEventListener('keydown', e => { keys[e.key] = true; if (e.key.toLowerCase() === 'f') { if (!document.fullscreenElement) canvas.requestFullscreen({navigationUI:'hide'}).catch(()=>{});
            else document.exitFullscreen(); } if (e.key === 'd' || e.key === 'D') showDebug = !showDebug; });
        window.addEventListener('keyup', e => keys[e.key] = false);

        window.onload = () => {
            startTime = Date.now();
            initLevel();
            loop();
        };
    </script>
</body>
</html>
