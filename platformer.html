<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Metallic Madness Zone 1 - Bad Future</title>
    <style>
        body { margin:0; background:#000; overflow:hidden; font-family:Arial, sans-serif; }
        canvas { display:block; margin:20px auto; image-rendering:pixelated; border:6px solid #222; box-shadow:0 0 30px #0f0; }
        #overlay {
            position:absolute; top:10px; left:10px; color:#0f0; text-shadow:2px 2px 0 #000; pointer-events:none;
            font-size:18px; line-height:1.3;
        }
    </style>
</head>
<body>
    <div id="overlay">
        METALLIC MADNESS ZONE 1<br>
        BAD FUTURE<br><br>
        ← → or A D = Move  SPACE / ↑ = Jump
    </div>
    <canvas id="c" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');

        const SCREEN_W = 800;
        const SCREEN_H = 600;

        let WORLD_W = 4096; // will be overwritten by image width

        // Player (Sonic-style red hedgehog feel)
        const player = {
            x: 100,
            y: 380,
            vx: 0,
            vy: 0,
            w: 32,
            h: 48,
            speed: 6.2,
            jump: -17,
            onGround: false
        };

        const keys = {};

        // The full Metallic Madness foreground (your uploaded image)
        const fg = new Image();
        fg.src = 'http://easierbycode.com/assets/spritesheets/tiles.png';   // ← your exact path

        let loaded = false;
        fg.onload = () => {
            WORLD_W = fg.width;
            loaded = true;
            console.log('%c✅ Metallic Madness loaded — world width = ' + WORLD_W + 'px', 'color:#0f0;font-size:16px');
        };

        // Collision platforms (solid rusty metal parts only — matches the visible structures)
        const platforms = [
            // Bottom main floor
            {x:0,   y:520, w:6200, h:120},

            // First big raised platforms
            {x:140,  y:440, w:380, h:22},
            {x:620,  y:380, w:240, h:22},
            {x:980,  y:470, w:360, h:22},
            {x:1480, y:360, w:290, h:22},
            {x:1920, y:430, w:310, h:22},

            // Mid-level platforms
            {x:2380, y:310, w:420, h:22},
            {x:2920, y:410, w:280, h:22},
            {x:3320, y:270, w:460, h:22},
            {x:3920, y:370, w:310, h:22},

            // Smaller details & pipes
            {x:480,  y:490, w:110, h:22},
            {x:1180, y:320, w:150, h:22},
            {x:2680, y:370, w:190, h:22},
            {x:3780, y:290, w:170, h:22},
            {x:4450, y:430, w:240, h:22},

            // Final stretch
            {x:4900, y:340, w:300, h:22},
            {x:5300, y:480, w:800, h:22}
        ];

        const GRAVITY = 0.92;
        const FRICTION = 0.78;
        let camX = 0;

        function collide() {
            player.onGround = false;
            for (let p of platforms) {
                if (
                    player.x + player.w > p.x &&
                    player.x < p.x + p.w &&
                    player.y + player.h > p.y &&
                    player.y < p.y + p.h
                ) {
                    // Top collision (landing)
                    if (player.vy >= 0 && player.y + player.h - player.vy <= p.y + 8) {
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.onGround = true;
                    }
                    // Bottom collision (head bump)
                    else if (player.vy < 0 && player.y - player.vy >= p.y + p.h - 8) {
                        player.y = p.y + p.h;
                        player.vy = 0.5;
                    }
                    // Side collisions
                    else if (player.vx > 0) player.x = p.x - player.w;
                    else if (player.vx < 0) player.x = p.x + p.w;
                }
            }
        }

        function update() {
            // Input
            player.vx = 0;
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.vx = -player.speed;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) player.vx = player.speed;

            if ((keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W']) && player.onGround) {
                player.vy = player.jump;
                player.onGround = false;
            }

            // Physics
            player.vy += GRAVITY;
            player.x += player.vx;
            player.y += player.vy;

            // Friction
            player.vx *= FRICTION;

            collide();

            // World bounds
            if (player.x < 0) player.x = 0;
            if (player.x > WORLD_W - player.w) player.x = WORLD_W - player.w;
            if (player.y > 750) { // fall death
                player.x = 100;
                player.y = 380;
                player.vy = 0;
            }

            // Camera (smooth follow)
            const target = player.x - SCREEN_W / 2 + player.w / 2;
            camX += (target - camX) * 0.12;
            camX = Math.max(0, Math.min(camX, WORLD_W - SCREEN_W));
        }

        function draw() {
            // Background (classic Sonic green)
            ctx.fillStyle = '#0a2a0a';
            ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);

            ctx.save();
            ctx.translate(-Math.floor(camX), 0);

            // Draw the full Metallic Madness foreground
            if (loaded) {
                ctx.drawImage(fg, 0, 0);
            } else {
                ctx.fillStyle = '#222';
                ctx.fillRect(0, 400, WORLD_W, 300);
                ctx.fillStyle = '#555';
                ctx.font = 'bold 42px Arial';
                ctx.fillText('LOADING METALLIC MADNESS...', 300, 480);
            }

            // Player (retro Sonic feel)
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Spikes / shoes
            ctx.fillStyle = '#222';
            ctx.fillRect(player.x + 4, player.y + player.h - 8, player.w - 8, 8);

            // Eye
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x + 20, player.y + 14, 10, 10);
            ctx.fillStyle = '#222';
            ctx.fillRect(player.x + 24, player.y + 17, 4, 4);

            ctx.restore();

            // Simple HUD
            ctx.fillStyle = '#0f0';
            ctx.font = '18px monospace';
            ctx.fillText('X ' + Math.floor(player.x), 680, 40);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup',   e => keys[e.key] = false);

        // Start
        window.onload = () => {
            loop();
        };
    </script>
</body>
</html>
