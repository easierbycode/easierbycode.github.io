<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Evil Invaders — Phaser 4</title>
    <!-- PWA manifest & iOS standalone mode -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Evil Invaders" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#000000" />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background: #000;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;
            -webkit-overflow-scrolling: auto;
            -ms-touch-action: none;
            font-family: sans-serif;
            color: #0f0;
        }
        #phaser-canvas {
            width: 100%;
            height: 100%;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #phaser-canvas canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
        }
        #iosInstallBanner {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2000;
            background: rgba(0,0,0,0.85);
            color: #fff;
            font-size: 12px;
            padding: 10px 12px;
            text-align: center;
            border-top: 1px solid #333;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        /* How-to modal overlay */
        #howtoModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 3000;
            background: rgba(0,0,0,0.88);
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        #howtoModal.visible { display: flex; }
        #howtoModalContent {
            background: #222;
            color: #fff;
            border-radius: 8px;
            padding: 20px;
            max-width: 260px;
            width: 100%;
            font-size: 13px;
            line-height: 1.6;
            text-align: center;
            position: relative;
        }
        #howtoModalContent h3 { margin: 0 0 12px; font-size: 16px; }
        #howtoModalContent p { margin: 8px 0; }
        #howtoModalClose {
            position: absolute;
            top: 6px;
            right: 10px;
            background: none;
            border: none;
            color: #888;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
        }
        /* Force portrait layout hack */
        @media screen and (orientation: landscape) {
            html {
                transform: rotate(-90deg);
                transform-origin: left top;
                width: 100vh;
                height: 100vw;
                overflow: hidden;
                position: absolute;
                top: 100%;
                left: 0;
            }
        }
    </style>

    <!-- Firebase config (global, loaded before compat libs) -->
    <script>
        window.firebaseConfig = window.firebaseConfig || {
            apiKey: "AIzaSyAHY_agipyNEXvY2J4jDgnlk9kLeM6O37Y",
            authDomain: "evil-invaders.firebaseapp.com",
            databaseURL: "https://evil-invaders-default-rtdb.firebaseio.com",
            projectId: "evil-invaders",
            storageBucket: "evil-invaders.firebasestorage.app",
            messagingSenderId: "149257705855",
            appId: "1:149257705855:web:3f048481dfc66cef61224a",
        };
        window.__FIREBASE_CONFIG__ = window.__FIREBASE_CONFIG__ || window.firebaseConfig;
        window.__FIREBASE_DATABASE_PATH__ = window.__FIREBASE_DATABASE_PATH__ || "leaderboards/globalHighScore";
    </script>
</head>
<body>
    <div id="baseUrl" hidden>./</div>

    <!-- Game canvas container -->
    <div id="phaser-canvas"></div>

    <!-- iOS "Add to Home Screen" banner -->
    <div id="iosInstallBanner">
        <span style="display:inline-block; max-width:280px; line-height:1.4;">
            For fullscreen: tap
            <span style="font-size:16px; vertical-align:middle;">&#x1F4E4;</span>
            then <strong>"Add to Home Screen"</strong>
        </span>
        <button id="iosInstallDismiss" style="position:absolute; top:4px; right:8px; background:none; border:none; color:#888; font-size:18px; cursor:pointer; padding:4px 8px; line-height:1;">×</button>
    </div>

    <!-- How-to modal -->
    <div id="howtoModal">
        <div id="howtoModalContent">
            <button id="howtoModalClose">×</button>
            <h3>HOW TO PLAY</h3>
            <p><strong>Move:</strong> Drag / Arrow keys / WASD</p>
            <p><strong>Shoot:</strong> Automatic</p>
            <p><strong>Special:</strong> Tap SP gauge / Spacebar</p>
            <p>Defeat enemies, collect power-ups, and beat bosses!</p>
            <p style="font-size:11px; color:#888; margin-top:16px;">Tap outside to close</p>
        </div>
    </div>

    <!-- Phaser 4.0.0-rc.6 -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@4.0.0-rc.6/dist/phaser.min.js"></script>
    <!-- Firebase (leaderboard support) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

    <script>
        // -----------------------------------------------------------------------
        // How-to modal open/close (called from TitleScene howto button)
        // -----------------------------------------------------------------------
        window.howtoModalOpen = function () {
            var modal = document.getElementById("howtoModal");
            if (modal) modal.classList.add("visible");
        };
        window.howtoModalClose = function () {
            var modal = document.getElementById("howtoModal");
            if (modal) modal.classList.remove("visible");
        };
        (function () {
            var modal = document.getElementById("howtoModal");
            var closeBtn = document.getElementById("howtoModalClose");
            if (modal) {
                modal.addEventListener("click", function (e) {
                    if (e.target === modal) window.howtoModalClose();
                });
            }
            if (closeBtn) {
                closeBtn.addEventListener("click", window.howtoModalClose);
            }
        })();

        // -----------------------------------------------------------------------
        // Orientation lock
        // -----------------------------------------------------------------------
        function lockPortrait() {
            if (window.screen && window.screen.orientation && window.screen.orientation.lock) {
                window.screen.orientation.lock("portrait").catch(function () {});
            }
        }

        // -----------------------------------------------------------------------
        // Fullscreen helpers
        // -----------------------------------------------------------------------
        function enterFullscreen(element) {
            var el = element || document.documentElement;
            var rfs = el.requestFullscreen
                || el.webkitRequestFullscreen
                || el.msRequestFullscreen;
            if (!rfs) return;
            var promise = rfs.call(el, { navigationUI: "hide" });
            if (promise && promise.then) {
                promise.then(lockPortrait).catch(function () {});
            } else {
                lockPortrait();
            }
        }

        function isFullscreen() {
            return !!(document.fullscreenElement
                || document.webkitFullscreenElement
                || document.msFullscreenElement);
        }

        function onFullscreenChange() {
            if (!isFullscreen()) {
                setTimeout(function () {
                    if (!isFullscreen()) {
                        enterFullscreen(
                            document.querySelector("#phaser-canvas canvas")
                            || document.documentElement
                        );
                    }
                }, 300);
            }
        }

        if (document.fullscreenEnabled || document.webkitFullscreenEnabled) {
            document.addEventListener("fullscreenchange", onFullscreenChange, false);
            document.addEventListener("webkitfullscreenchange", onFullscreenChange, false);
        }

        // -----------------------------------------------------------------------
        // Edge-swipe prevention
        // -----------------------------------------------------------------------
        (function preventEdgeSwipe() {
            var EDGE_PX = 30;
            document.addEventListener("touchstart", function (e) {
                if (!e.touches || e.touches.length === 0) return;
                var x = e.touches[0].clientX;
                var w = window.innerWidth;
                if (x < EDGE_PX || x > w - EDGE_PX) e.preventDefault();
            }, { passive: false, capture: true });
            document.addEventListener("touchmove", function (e) {
                if (!e.touches || e.touches.length === 0) return;
                var x = e.touches[0].clientX;
                var w = window.innerWidth;
                if (x < EDGE_PX || x > w - EDGE_PX) e.preventDefault();
            }, { passive: false, capture: true });
        })();

        // Prevent back-navigation
        window.addEventListener("popstate", function () {
            history.pushState(null, "", location.href);
        });
        history.pushState(null, "", location.href);

        // -----------------------------------------------------------------------
        // iOS Safari "Add to Home Screen" prompt
        // -----------------------------------------------------------------------
        (function iosInstallPrompt() {
            if (typeof navigator === "undefined") return;
            var ua = navigator.userAgent;
            var isIOS = /iPad|iPhone|iPod/.test(ua)
                || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
            var isStandalone = window.navigator.standalone === true
                || window.matchMedia("(display-mode: standalone)").matches;
            if (!isIOS || isStandalone || window.cordova) return;
            try { if (localStorage.getItem("iosInstallDismissed")) return; } catch (e) {}
            setTimeout(function () {
                var banner = document.getElementById("iosInstallBanner");
                if (!banner) return;
                banner.style.display = "";
                var btn = document.getElementById("iosInstallDismiss");
                if (btn) {
                    btn.addEventListener("click", function () {
                        banner.style.display = "none";
                        try { localStorage.setItem("iosInstallDismissed", "1"); } catch (e) {}
                    }, false);
                }
                setTimeout(function () {
                    if (banner.style.display !== "none") banner.style.display = "none";
                }, 15000);
            }, 2000);
        })();
    </script>

    <!-- Boot the Phaser 4 game -->
    <script type="module">
        import { gameState } from "./src/gameState.js";
        import { initializeFirebaseScores } from "./src/firebaseScores.js";
        import { createPhaserGame } from "./src/phaser/PhaserGame.js";

        function waitFor(ms) {
            return new Promise(function (resolve) { setTimeout(resolve, ms); });
        }

        // ?lowmode=1 skips audio loading for faster boot (useful for testing)
        if (new URLSearchParams(window.location.search).get("lowmode") === "1") {
            gameState.lowModeFlg = true;
        }

        // Initialize Firebase scores (race with timeout for fast boot)
        Promise.race([
            initializeFirebaseScores().catch(function () {}),
            waitFor(1500),
        ]).then(function () {
            createPhaserGame();
        });
    </script>
</body>
</html>
